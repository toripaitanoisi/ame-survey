<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンスリープ 需要アンケート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1e1c18;
    --text-sub: #8a8680;
    --green: #3b7c2a;
    --green-light: #e8f5e0;
    --accent: #5a9e45;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 0.75rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  header h1 { font-size: 14px; font-weight: 600; color: var(--text-sub); letter-spacing: 0.05em; }

  .container { width: 100%; max-width: 480px; padding: 1.5rem 1rem 3rem; }

  /* 進捗 */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-count { font-size: 13px; color: var(--text-sub); }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

  /* ポケモンカード */
  .pokemon-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem 1.5rem 1.25rem;
    text-align: center;
    margin-bottom: 1rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    overflow: hidden;
  }
  .pokemon-card.slide-out {
    opacity: 0;
    transform: translateX(-24px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .pokemon-card.slide-in {
    opacity: 0;
    transform: translateX(24px);
    transition: none;
  }
  .pokemon-card.slide-in-active {
    opacity: 1;
    transform: translateX(0);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .pokemon-icon {
    width: 80px;
    height: 80px;
    object-fit: contain;
    image-rendering: auto;
  }
  .pokemon-icon-placeholder {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .pokemon-name {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  /* 選択肢ボタン */
  .choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .choice-btn {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover { border-color: var(--accent); background: var(--green-light); }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.selected {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
  }
  /* A: スケールポン */
  .choice-btn.pop {
    animation: btn-pop 0.25s ease forwards;
  }
  @keyframes btn-pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.045); border-color: var(--green); background: var(--green-light); color: var(--green); }
    100% { transform: scale(1); }
  }
  /* チェックマーク用ラッパー */
  .choice-btn { position: relative; overflow: hidden; }
  .choice-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
  /* C: チェックマーク（ボタン内で右端に表示） */
  .check-pop {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    pointer-events: none;
    animation: check-appear 0.35s ease forwards;
  }
  @keyframes check-appear {
    0%   { transform: translateY(-50%) scale(0); opacity: 0; }
    30%  { transform: translateY(-50%) scale(1.3); opacity: 1; }
    70%  { transform: translateY(-50%) scale(1);   opacity: 1; }
    100% { transform: translateY(-50%) scale(1);   opacity: 0; }
  }

  /* スキップ・戻る */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
  .nav-btn {
    font-size: 12px; color: var(--text-sub); background: none; border: none;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* 送信ボタン */
  .submit-btn {
    width: 100%; padding: 16px;
    border-radius: 12px; border: none;
    background: var(--green); color: #fff;
    font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    margin-top: 1rem; display: none;
  }
  .submit-btn:hover { background: #2d6020; }
  .submit-btn.visible { display: block; }

  /* 完了画面 */
  .done-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }
  .done-screen.visible { display: flex; }
  .done-icon {
    font-size: 64px;
    animation: done-icon-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes done-icon-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(8deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .done-emojis {
    font-size: 28px;
    letter-spacing: 6px;
    animation: done-emojis-in 0.5s ease 0.2s both;
  }
  @keyframes done-emojis-in {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .done-title {
    font-size: 26px;
    font-weight: 800;
    color: var(--green);
    animation: done-title-in 0.5s ease 0.15s both;
  }
  @keyframes done-title-in {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .done-sub {
    font-size: 14px; color: var(--text-sub); line-height: 1.7;
    animation: done-title-in 0.5s ease 0.3s both;
  }
  .done-count {
    font-size: 14px; color: var(--accent); font-weight: 700;
    background: var(--green-light);
    padding: 8px 16px;
    border-radius: 99px;
    animation: done-title-in 0.5s ease 0.4s both;
  }

  /* ローディング */
  .sending-overlay {
    position: fixed; inset: 0; background: rgba(250,249,246,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 100;
  }
  .sending-overlay.visible { display: flex; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sending-text { font-size: 13px; color: var(--text-sub); }

  /* 重複警告 */
  .already-done {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .already-done.visible { display: flex; }
  .already-done-icon { font-size: 48px; }
  .already-done-title { font-size: 18px; font-weight: 700; }
  .already-done-sub { font-size: 14px; color: var(--text-sub); line-height: 1.7; }
  .retry-btn {
    padding: 12px 24px; border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--surface); font-family: inherit; font-size: 14px;
    font-weight: 600; color: var(--text); cursor: pointer;
  }
</style>

  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitAll()">📩 回答を送信する</button>

  <!-- 完了画面 -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">🎉</div>
    <div class="done-title">おつかれさまでした！</div>
    <div class="done-emojis">✨🎊💚🌟✨</div>
    <div class="done-sub">回答はスプレッドシートに保存されました。<br>ご協力ありがとうございます！</div>
    <div class="done-count" id="done-count"></div>
  </div>

</div>

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 前回の順序を復元、なければ新たにシャッフル
let shuffled;
const savedOrder = localStorage.getItem(STORAGE_ORDER_KEY);
if(savedOrder) {
  try {
    const order = JSON.parse(savedOrder);
    shuffled = order.map(id => pokemon.find(p => p.id === id)).filter(Boolean);
  } catch(e) { shuffled = shuffle(pokemon); }
} else {
  shuffled = shuffle(pokemon);
  localStorage.setItem(STORAGE_ORDER_KEY, JSON.stringify(shuffled.map(p => p.id)));
}

let current = 0;
let answers = {};

// 前回の回答を復元
const savedAnswers = localStorage.getItem(STORAGE_ANSWERS_KEY);
if(savedAnswers) {
  try { answers = JSON.parse(savedAnswers); } catch(e) {}
}

function init() {
  // 送信済みチェック
  if(localStorage.getItem(STORAGE_KEY) === 'done') {
    document.getElementById('already-done').classList.add('visible');
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('pokemon-card').style.display = 'none';
    document.getElementById('choices').style.display = 'none';
    document.getElementById('nav-row').style.display = 'none';
    return;
  }
  showPokemon(current);
}

function resetAndStart() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_ANSWERS_KEY);
  localStorage.removeItem(STORAGE_ORDER_KEY);
  shuffled = shuffle(pokemon);
  localStorage.setItem(STORAGE_ORDER_KEY, JSON.stringify(shuffled.map(p => p.id)));
  answers = {};
  current = 0;
  document.getElementById('already-done').classList.remove('visible');
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('pokemon-card').style.display = '';
  document.getElementById('choices').style.display = '';
  document.getElementById('nav-row').style.display = '';
  showPokemon(0);
}

function showPokemon(idx) {
  const p = shuffled[idx];

  // アイコン
  const iconEl = document.getElementById('pokemon-icon');
  const fallbackEl = document.getElementById('pokemon-icon-fallback');
  iconEl.style.display = '';
  fallbackEl.style.display = 'none';
  iconEl.src = p.img;
  iconEl.alt = p.name;

  document.getElementById('pokemon-name').textContent = p.name;

  const pct = Math.round((idx / shuffled.length) * 100);
  document.getElementById('progress-count').textContent = `${idx + 1} / ${shuffled.length}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  if(answers[idx] !== undefined) {
    document.querySelectorAll('.choice-btn')[answers[idx]].classList.add('selected');
  }

  document.getElementById('btn-back').disabled = (idx === 0);

  const isLast = (idx === shuffled.length - 1);
  document.getElementById('btn-skip').style.display = isLast ? 'none' : '';
  document.getElementById('submit-btn').classList.toggle('visible', isLast);
}

function answer(choiceIdx) {
  answers[current] = choiceIdx;
  localStorage.setItem(STORAGE_ANSWERS_KEY, JSON.stringify(answers));

  const btns = document.querySelectorAll('.choice-btn');

  // A: スケールポン + C: チェックマーク
  btns.forEach((b, i) => {
    b.classList.remove('selected', 'pop');
    // 既存チェックを削除
    const old = b.querySelector('.check-pop');
    if(old) old.remove();

    if(i === choiceIdx) {
      // スケールポン
      void b.offsetWidth; // reflow
      b.classList.add('pop');

      // チェックマーク飛び出し
      const check = document.createElement('span');
      check.className = 'check-pop';
      check.textContent = '✓';
      b.appendChild(check);
      setTimeout(() => check.remove(), 400);
    }
  });

  // 250ms後にカードスライドアウト
  setTimeout(() => {
    const card = document.getElementById('pokemon-card');
    card.classList.add('slide-out');

    setTimeout(() => {
      // ボタンのpopクラスをクリア
      btns.forEach(b => b.classList.remove('pop'));

      if(current < shuffled.length - 1) {
        current++;
        // まず非表示状態にしてから内容を更新
        card.classList.remove('slide-out');
        card.classList.add('slide-in');
        // slide-inでopacity:0になってから内容を更新
        requestAnimationFrame(() => {
          showPokemon(current);
          requestAnimationFrame(() => {
            card.classList.remove('slide-in');
            card.classList.add('slide-in-active');
            setTimeout(() => card.classList.remove('slide-in-active'), 200);
          });
        });
      } else {
        card.classList.remove('slide-out');
        document.getElementById('submit-btn').classList.add('visible');
      }
    }, 150);
  }, 250);
}

function skip() {
  if(current < shuffled.length - 1) {
    current++;
    showPokemon(current);
  }
}

function goBack() {
  if(current > 0) {
    current--;
    showPokemon(current);
  }
}

async function submitAll() {
  const answered = Object.entries(answers).map(([idx, choiceIdx]) => {
    const p = shuffled[parseInt(idx)];
    return {
      id: p.id,
      name: p.name,
      answer: LABELS[choiceIdx],
      score: SCORES[choiceIdx]
    };
  });

  if(answered.length === 0) {
    alert('まだ回答がありません。');
    return;
  }

  const overlay = document.getElementById('sending-overlay');
  overlay.classList.add('visible');

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: answered })
    });

    // 送信済みフラグをローカルに保存
    localStorage.setItem(STORAGE_KEY, 'done');
    localStorage.removeItem(STORAGE_ANSWERS_KEY);

    overlay.classList.remove('visible');

    document.getElementById('pokemon-card').style.display = 'none';
    document.getElementById('choices').style.display = 'none';
    document.getElementById('nav-row').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    const done = document.getElementById('done-screen');
    done.classList.add('visible');
    document.getElementById('done-count').textContent = `${answered.length}匹分の回答を送信しました`;

  } catch(err) {
    overlay.classList.remove('visible');
    alert('送信に失敗しました。もう一度お試しください。');
  }
}

init();
</script>
